<template id="power-lora-list">
  <section class="widget vstack gap-1" data-role="list"></section>
</template>

<template id="power-lora-row" data-role="row">
  <div class="d-flex w-100 align-items-center gap-1" data-role="row">
    <span class="comfygrid-lora-handle pi pi-bars" aria-label="Drag to reorder"></span>
    <input class="form-check-input m-0" type="checkbox" data-action="toggle" data-role="toggle" />
    <div class="input-group" style="min-width: 0; flex: 1">
      <input class="form-control" type="text" data-action="lora" data-role="lora" />
      <datalist data-role="lora-options"></datalist>
      <button class="btn btn-sm btn-secondary" data-action="open-modal" data-role="open-modal" aria-label="Select model">
        <i class="bi bi-window"></i>
      </button>
    </div>
    <input class="form-control" style="width: 5.5rem" type="number" step="0.05" data-action="strength" data-role="strength" />
    <button class="remove-btn btn btn-sm p-0" data-action="remove" data-role="remove" aria-label="Remove LoRA">
      <i class="pi pi-times"></i>
    </button>
  </div>
</template>

<template id="power-lora-add-button">
  <button type="button" class="btn btn-sm btn-secondary w-100" data-role="add"></button>
</template>
