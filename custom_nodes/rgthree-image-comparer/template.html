<template id="rgthree-image-comparer">
  <div class="vstack align-items-center" data-role="root">
    <div class="btn-group w-100 pb-1 compare-buttons" data-role="compare-buttons">
      <button type="button" name="compare-img" id="compare-img1" class="btn btn-outline-secondary btn-sm active">Image 1</button>
      <button type="button" name="compare-img" id="compare-img2" class="btn btn-outline-secondary btn-sm">Image 2</button>
    </div>
    <div class="widget" data-role="image" style="width: 256px; height: 256px">
      <img class="object-fit-contain w-100 h-100" src="" alt="" data-role="image1" />
      <img class="object-fit-contain w-100 h-100" src="" alt="" data-role="image2" />
    </div>
  </div>
</template>
