name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Install backend dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build executable with PyInstaller
        shell: cmd
        run: |
          mkdir release
          mkdir release\config
          mkdir release\frontend
          mkdir release\hook
          mkdir release\custom_nodes
          python -m PyInstaller --name comfygrid --icon=frontend/public/icon.ico --onefile --console --distpath release ^
            --hidden-import uvicorn.logging ^
            --hidden-import uvicorn.loops ^
            --hidden-import uvicorn.loops.auto ^
            --hidden-import uvicorn.protocols ^
            --hidden-import uvicorn.protocols.http ^
            --hidden-import uvicorn.protocols.http.auto ^
            --hidden-import uvicorn.protocols.websockets ^
            --hidden-import uvicorn.protocols.websockets.auto ^
            --hidden-import uvicorn.lifespan.on ^
            --hidden-import uvicorn.lifespan.off ^
            --hidden-import polars ^
            --hidden-import piexif ^
            main.py

      - name: Assemble Release Folder
        shell: cmd
        run: |
          copy Caddyfile release\
          xcopy config release\config /E /I /Q
          xcopy frontend\dist release\frontend /E /I /Q
          xcopy hook release\hook /E /I /Q
          if exist "custom_nodes\" xcopy custom_nodes release\custom_nodes /E /I /Q
          if exist "extensions\" xcopy extensions release\extensions /E /I /Q
          copy update.bat release\
          copy update.ps1 release\
          python -c "import json; from pathlib import Path; from comfygrid.services.git import get_version_info; Path('release/version.json').write_text(json.dumps(get_version_info(), ensure_ascii=False), encoding='utf-8')"

      - name: Assemble Portable Release Folder
        shell: cmd
        run: |
          mkdir release_portable
          copy Caddyfile release_portable\
          copy main.py release_portable\
          copy pyproject.toml release_portable\
          copy README.md release_portable\
          copy run.bat release_portable\
          xcopy comfygrid release_portable\comfygrid /E /I /Q
          xcopy config release_portable\config /E /I /Q
          xcopy frontend\dist release_portable\frontend\dist /E /I /Q
          xcopy hook release_portable\hook /E /I /Q
          if exist "custom_nodes\" xcopy custom_nodes release_portable\custom_nodes /E /I /Q
          if exist "extensions\" xcopy extensions release_portable\extensions /E /I /Q
          if exist "modules\" xcopy modules release_portable\modules /E /I /Q
          python -c "import json; from pathlib import Path; from comfygrid.services.git import get_version_info; Path('release_portable/version.json').write_text(json.dumps(get_version_info(), ensure_ascii=False), encoding='utf-8')"

      - name: Create zip archives
        run: |
          Compress-Archive -Path release\* -DestinationPath ComfyGrid-${{ github.ref_name }}.zip
          Compress-Archive -Path release_portable\* -DestinationPath ComfyGrid-portable-${{ github.ref_name }}.zip
          Compress-Archive -Path frontend\dist -DestinationPath frontend-dist-${{ github.ref_name }}.zip

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ComfyGrid-builds-${{ github.ref_name }}
          path: |
            ComfyGrid-${{ github.ref_name }}.zip
            ComfyGrid-portable-${{ github.ref_name }}.zip
            frontend-dist-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ComfyGrid-${{ github.ref_name }}.zip
            ComfyGrid-portable-${{ github.ref_name }}.zip
            frontend-dist-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
